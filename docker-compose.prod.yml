services:

  # ──────────────────────────────────────────────
  # Next.js — pulled from GHCR (built in CI)
  # ──────────────────────────────────────────────
  tavero-web:
    image: ${TAVERO_IMAGE:-ghcr.io/danielvilar/tavero-web:latest}
    container_name: tavero-web
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    networks:
      - tavero-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ──────────────────────────────────────────────
  # Nginx — reverse proxy + SSL termination
  # ──────────────────────────────────────────────
  tavero-gateway:
    image: nginx:1.27-alpine
    container_name: tavero-gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./tavero-gateway/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      tavero-web:
        condition: service_healthy
    networks:
      - tavero-net

  # ──────────────────────────────────────────────
  # Certbot — issues + auto-renews Let's Encrypt
  # Auto-renews every 12h (cert expires in 90 days)
  # ──────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: tavero-certbot
    restart: unless-stopped
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    # Renews cert every 12 hours in background
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do certbot renew --webroot --webroot-path /var/www/certbot --quiet;
      sleep 12h & wait $${!}; done"

networks:
  tavero-net:
    driver: bridge

volumes:
  certbot-www:
  certbot-certs:
