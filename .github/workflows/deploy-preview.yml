name: Deploy · Preview

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-preview
  cancel-in-progress: true

jobs:
  # Vercel despliega la web en preview automáticamente
  # Aquí solo actualizamos el canal preview de la app móvil
  update-mobile-preview:
    name: Update · Mobile OTA (preview)
    runs-on: ubuntu-latest
    environment: preview
    defaults:
      run:
        working-directory: tavero-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tavero-app/package-lock.json

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci --prefer-offline

      - name: Publicar update OTA (preview)
        run: |
          eas update \
            --branch preview \
            --message "Preview: ${{ github.event.head_commit.message }}" \
            --platform android
        env:
          CI: '1'
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_MENU_URL: ${{ secrets.EXPO_PUBLIC_MENU_URL }}
