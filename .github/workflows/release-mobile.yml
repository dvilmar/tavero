name: Release · Mobile Build

on:
  # Lanzamiento automático con cada push a main o develop
  push:
    branches: [main, develop]

  # También se puede lanzar manualmente con opciones
  workflow_dispatch:
    inputs:
      platform:
        description: Plataforma
        type: choice
        options: [android, ios, all]
        default: android
      profile:
        description: Perfil
        type: choice
        options: [preview, production]
        default: preview

jobs:
  build:
    name: EAS Build · ${{ inputs.platform || 'android' }} · ${{ inputs.profile || 'preview' }}
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: tavero-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tavero-app/package-lock.json

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci --prefer-offline

      - name: EAS Build
        run: |
          eas build \
            --platform ${{ inputs.platform || 'android' }} \
            --profile ${{ inputs.profile || 'preview' }} \
            --non-interactive \
            --no-wait
        env:
          CI: '1'
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_MENU_URL: ${{ secrets.EXPO_PUBLIC_MENU_URL }}
