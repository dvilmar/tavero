name: Release · Mobile Build

on:
  push:
    branches: [main, develop]

  workflow_dispatch:
    inputs:
      platform:
        description: Plataforma
        type: choice
        options: [android, ios, all]
        default: android
      profile:
        description: Perfil
        type: choice
        options: [preview, production]
        default: preview

jobs:
  # ── APK (preview) — disponible para descarga directa ─────────────────────
  build-apk:
    name: EAS Build · android · preview (APK)
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: tavero-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tavero-app/package-lock.json

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci --prefer-offline

      - name: EAS Build APK
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --no-wait
        env:
          CI: '1'

  # ── AAB (production) → Play Store ────────────────────────────────────────
  build-and-submit:
    name: EAS Build · android · production (AAB) + Play Store
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    defaults:
      run:
        working-directory: tavero-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tavero-app/package-lock.json

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci --prefer-offline

      - name: EAS Build AAB (esperando resultado)
        run: |
          eas build \
            --platform android \
            --profile production \
            --non-interactive
        env:
          CI: '1'

      - name: Play Store · Submit (internal track)
        env:
          CI: '1'
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: |
          if [ -z "$GOOGLE_SERVICE_ACCOUNT_KEY" ]; then
            echo "⚠️  GOOGLE_SERVICE_ACCOUNT_KEY no configurado, saltando submit"
            exit 0
          fi
          echo "$GOOGLE_SERVICE_ACCOUNT_KEY" > /tmp/gsa.json
          eas submit \
            --platform android \
            --profile production \
            --latest \
            --non-interactive

  # ── Build manual (workflow_dispatch) ─────────────────────────────────────
  build-manual:
    name: EAS Build · ${{ inputs.platform }} · ${{ inputs.profile }} (manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: production
    defaults:
      run:
        working-directory: tavero-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tavero-app/package-lock.json

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci --prefer-offline

      - name: EAS Build
        run: |
          eas build \
            --platform ${{ inputs.platform }} \
            --profile ${{ inputs.profile }} \
            --non-interactive \
            --no-wait
        env:
          CI: '1'
