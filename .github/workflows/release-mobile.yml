name: Release · Mobile Build

# Ejecuta esto cuando cambies algo nativo (nueva librería, permisos, etc.)
# Para cambios solo de JS no hace falta — el OTA update es suficiente
on:
  workflow_dispatch:
    inputs:
      platform:
        description: Plataforma
        type: choice
        options: [android, ios, all]
        default: android
      profile:
        description: Perfil
        type: choice
        options: [preview, production]
        default: preview

jobs:
  build:
    name: EAS Build · ${{ inputs.platform }} · ${{ inputs.profile }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.profile }}
    defaults:
      run:
        working-directory: tavero-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tavero-app/package-lock.json

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci --prefer-offline

      - name: EAS Build
        run: |
          eas build \
            --platform ${{ inputs.platform }} \
            --profile ${{ inputs.profile }} \
            --non-interactive \
            --no-wait
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_MENU_URL: ${{ secrets.EXPO_PUBLIC_MENU_URL }}
