name: Release · Mobile Build

on:
  push:
    branches: [main, develop]

  workflow_dispatch:
    inputs:
      platform:
        description: Plataforma
        type: choice
        options: [android, ios, all]
        default: android
      profile:
        description: Perfil
        type: choice
        options: [preview, production]
        default: preview

jobs:
  build:
    name: EAS Build · ${{ inputs.platform || 'android' }} · ${{ inputs.profile || 'preview' }}
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: tavero-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tavero-app/package-lock.json

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci --prefer-offline

      # Push a main → build production AAB y espera al resultado para poder subir
      - name: EAS Build (production · esperando resultado)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          eas build \
            --platform android \
            --profile production \
            --non-interactive
        env:
          CI: '1'
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_MENU_URL: ${{ secrets.EXPO_PUBLIC_MENU_URL }}

      # Push a main → subir el AAB a Play Store (track: internal)
      - name: Play Store · Submit (internal track)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}' > /tmp/gsa.json
          eas submit \
            --platform android \
            --profile production \
            --latest \
            --non-interactive
        env:
          CI: '1'

      # Push a develop o lanzamiento manual → build rápido sin esperar
      - name: EAS Build (preview · sin esperar)
        if: github.ref != 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: |
          eas build \
            --platform ${{ inputs.platform || 'android' }} \
            --profile ${{ inputs.profile || 'preview' }} \
            --non-interactive \
            --no-wait
        env:
          CI: '1'
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_MENU_URL: ${{ secrets.EXPO_PUBLIC_MENU_URL }}
