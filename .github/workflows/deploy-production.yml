name: Deploy · Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── 1. Supabase: aplicar migraciones de DB ────────────────────────────────
  migrate-db:
    name: Migrate · DB
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link al proyecto Supabase
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Aplicar migraciones
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  # ── 2. Mobile: OTA update (sin pasar por la tienda) ──────────────────────
  #     Vercel despliega la web automáticamente al detectar el push a main
  update-mobile:
    name: Update · Mobile OTA
    runs-on: ubuntu-latest
    needs: migrate-db
    environment: production
    defaults:
      run:
        working-directory: tavero-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tavero-app/package-lock.json

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci --prefer-offline

      - name: Publicar update OTA
        run: |
          eas update \
            --branch production \
            --message "${{ github.event.head_commit.message }}" \
            --non-interactive
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_MENU_URL: ${{ secrets.EXPO_PUBLIC_MENU_URL }}

  # ── Resumen ───────────────────────────────────────────────────────────────
  summary:
    name: Resumen
    runs-on: ubuntu-latest
    needs: [migrate-db, update-mobile]
    if: always()
    steps:
      - run: |
          echo "## Deploy Producción" >> "$GITHUB_STEP_SUMMARY"
          echo "| | Estado |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| DB Migrations | ${{ needs.migrate-db.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Web (Vercel) | automático ✓ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mobile OTA | ${{ needs.update-mobile.result }} |" >> "$GITHUB_STEP_SUMMARY"
