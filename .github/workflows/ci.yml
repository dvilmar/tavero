name: CI

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-web:
    name: TypeCheck · Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tavero-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tavero-web/package-lock.json
      - run: npm ci --prefer-offline
      - run: npx tsc --noEmit

  typecheck-app:
    name: TypeCheck · App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tavero-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tavero-app/package-lock.json
      - run: npm ci --prefer-offline
      - run: npx tsc --noEmit

  lint-web:
    name: Lint · Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tavero-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tavero-web/package-lock.json
      - run: npm ci --prefer-offline
      - run: npx next lint --max-warnings 0
  # placeholder
