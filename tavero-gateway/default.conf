# ============================================================
# Nginx — Tavero reverse proxy
#
# Modo actual: HTTP simple (sin SSL) para desarrollo local.
#
# Para activar SSL en producción:
#   1. Coloca tu certificado en nginx/certs/cert.pem
#   2. Coloca tu clave privada en nginx/certs/key.pem
#   3. Cambia "tu-dominio.com" por tu dominio real
#   4. Comenta el bloque de abajo y descomenta los dos bloques SSL
# ============================================================

# ── Sin SSL (desarrollo local) ─────────────────────────────
server {
    listen 80;
    server_name localhost;

    # Hide Nginx version
    server_tokens off;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req zone=general burst=20 nodelay;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "strict-origin"  always;

    location / {
        proxy_pass             http://tavero-web:3000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade           $http_upgrade;
        proxy_set_header       Connection        "upgrade";
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     60s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
    }
}

