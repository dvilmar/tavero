# ============================================================
# nginx.http.conf — FASE INICIAL (antes del certificado SSL)
#
# Usar sólo la primera vez, para que Certbot pueda emitir el cert.
# Una vez que tengas el cert, cambia al nginx.prod.conf.
#
# En docker-compose.prod.yml:
#   volumes:
#     - ./tavero-gateway/nginx.http.conf:/etc/nginx/conf.d/default.conf:ro
# ============================================================

# Rate limiting
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

server {
    listen 80;
    server_name TU-DOMINIO.COM www.TU-DOMINIO.COM;

    # Hide Nginx version
    server_tokens off;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "strict-origin"  always;

    # Rate limiting
    limit_req zone=general burst=20 nodelay;

    # Ruta ACME para Certbot (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy temporal al app (sin HTTPS todavía)
    location / {
        proxy_pass             http://tavero-web:3000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade           $http_upgrade;
        proxy_set_header       Connection        "upgrade";
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     60s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
    }
}
