# ============================================================
# nginx.prod.conf — PRODUCCIÓN con SSL (Let's Encrypt)
#
# Usar después de haber emitido el certificado con Certbot.
# Cambia TU-DOMINIO.COM por tu dominio real.
# ============================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# HTTP → HTTPS redirect + ACME challenge
server {
    listen 80;
    server_name TU-DOMINIO.COM www.TU-DOMINIO.COM;

    # Certbot ACME challenge (para renovaciones automáticas)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name TU-DOMINIO.COM www.TU-DOMINIO.COM;

    # Hide Nginx version
    server_tokens off;

    # Certificados Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/TU-DOMINIO.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TU-DOMINIO.COM/privkey.pem;

    # TLS moderno
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            SAMEORIGIN                                   always;
    add_header X-Content-Type-Options     nosniff                                      always;
    add_header Referrer-Policy            strict-origin-when-cross-origin              always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"   always;

    # Rate limiting
    limit_req zone=general burst=20 nodelay;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Proxy buffering
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 16k;

    # Cache largo para assets estáticos de Next.js (immutable)
    location /_next/static/ {
        proxy_pass http://tavero-web:3000/_next/static/;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Imágenes públicas
    location /images/ {
        proxy_pass http://tavero-web:3000/images/;
        add_header Cache-Control "public, max-age=86400";
    }

    # Auth endpoints — stricter rate limiting
    location /api/auth/ {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass http://tavero-web:3000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade           $http_upgrade;
        proxy_set_header       Connection        "upgrade";
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
    }

    # App
    location / {
        proxy_pass             http://tavero-web:3000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade           $http_upgrade;
        proxy_set_header       Connection        "upgrade";
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     60s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
    }
}
